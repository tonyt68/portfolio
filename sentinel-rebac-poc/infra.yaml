apiVersion: v1
kind: List
items:
- apiVersion: v1
  kind: Service
  metadata:
    name: redis-service
  spec:
    selector: {app: redis}
    ports: [{port: 6379}]
- apiVersion: v1
  kind: Service
  metadata:
    name: mail-service
  spec:
    selector: {app: mailhog}
    ports:
    - name: smtp
      port: 1025
    - name: ui
      port: 8025
- apiVersion: apps/v1
  kind: Deployment
  metadata: {name: redis}
  spec:
    selector: {matchLabels: {app: redis}}
    template:
      metadata: {labels: {app: redis}}
      spec:
        containers: [{name: redis, image: "redis:alpine"}]
- apiVersion: apps/v1
  kind: Deployment
  metadata: {name: mailhog}
  spec:
    selector: {matchLabels: {app: mailhog}}
    template:
      metadata: {labels: {app: mailhog}}
      spec:
        containers:
        - name: mailhog
          image: "mailhog/mailhog:latest"
          ports: [{containerPort: 1025}, {containerPort: 8025}]
